<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strategies & Snapshots — Market Research</title>
  <meta name="description" content="Trading strategies and weekly/monthly research snapshots." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site">
    <div class="inner">
      <a href="index.html" class="brand">Field<span class="dot">.</span>Notes</a>
      <nav class="site-nav">
        <a href="index.html">Logs</a>
        <a href="notes.html">Notes</a>
        <a href="strategies.html" class="active">Strategies</a>
        <button class="theme-toggle" onclick="toggleTheme()">Dark</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="page-head">
      <div class="eyebrow">Strategies &middot; Snapshots</div>
      <h1>Patterns worth keeping.</h1>
      <p class="lede">Strategies I'm developing, plus weekly and monthly synthesis of the daily log.</p>
    </div>

    <div class="tabs" id="tabs">
      <button data-kind="strategy" class="active">Strategies</button>
      <button data-kind="weekly">Weekly</button>
      <button data-kind="monthly">Monthly</button>
    </div>

    <div id="list"><div class="empty">Loading…</div></div>
  </main>

  <footer class="site">© <span id="year"></span> &middot; Field Notes</footer>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let currentKind = "strategy";

    async function load() {
      const { data, error } = await sb.from("strategies").select("*").eq("kind", currentKind).order("created_at", { ascending: false });
      const list = document.getElementById("list");
      if (error) { list.innerHTML = `<div class="empty">Failed to load: ${UI.escapeHtml(error.message)}</div>`; return; }
      if (!data || data.length === 0) { list.innerHTML = `<div class="empty">No ${currentKind === "strategy" ? "strategies" : currentKind + " snapshots"} yet.</div>`; return; }
      list.innerHTML = data.map(s => {
        const period = (s.period_start || s.period_end)
          ? `${UI.fmtDateShort(s.period_start)} – ${UI.fmtDateShort(s.period_end)}`
          : UI.fmtDate(s.created_at);
        return `<article class="snapshot">
          <div class="period">${UI.escapeHtml(period)}</div>
          <h2>${UI.escapeHtml(s.title)}</h2>
          <div class="body" style="white-space:pre-wrap">${UI.escapeHtml(s.body)}</div>
        </article>`;
      }).join("");
    }

    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest("button"); if (!btn) return;
      document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentKind = btn.dataset.kind;
      load();
    });

    load();
  </script>
  <script>
  function toggleTheme() {
    const html = document.documentElement;
    const btn = document.querySelector('.theme-toggle');
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
      btn.textContent = 'Dark';
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = 'Light';
      localStorage.setItem('theme', 'dark');
    }
  }
  (function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.querySelector('.theme-toggle').textContent = 'Light';
    }
  })();
  </script>
</body>
</html>
