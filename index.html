<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Logs — Market Research</title>
  <meta name="description" content="Daily market research logs: data points, observations, and sources." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site">
    <div class="inner">
      <a href="index.html" class="brand">Field<span class="dot">.</span>Notes</a>
      <nav class="site-nav">
        <a href="index.html" class="active">Logs</a>
        <a href="notes.html">Notes</a>
        <a href="strategies.html">Strategies</a>
        <button class="theme-toggle" onclick="toggleTheme()">Dark</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="page-head">
      <div class="eyebrow">Daily &middot; Market Research</div>
      <h1>Field notes from the tape.</h1>
      <p class="lede">A running log of price points, observations, screenshots, and source links — kept honest by being public.</p>
    </div>

    <div id="list"><div class="empty">Loading…</div></div>
  </main>

  <footer class="site">© <span id="year"></span> &middot; Field Notes</footer>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  <script>
  function toggleTheme() {
    const html = document.documentElement;
    const btn = document.querySelector('.theme-toggle');
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
      btn.textContent = 'Dark';
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = 'Light';
      localStorage.setItem('theme', 'dark');
    }
  }
  // Load saved theme
  (function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.querySelector('.theme-toggle').textContent = 'Light';
    }
  })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (async () => {
      const { data, error } = await sb
        .from("daily_logs")
        .select("*")
        .order("entry_date", { ascending: false })
        .order("created_at", { ascending: false });

      const list = document.getElementById("list");
      if (error) { list.innerHTML = `<div class="empty">Failed to load: ${UI.escapeHtml(error.message)}</div>`; return; }
      if (!data || data.length === 0) { list.innerHTML = `<div class="empty">No entries yet.</div>`; return; }

      list.innerHTML = data.map(e => `
        <article class="entry">
          <div class="entry-meta">
            <span class="date">${UI.fmtDate(e.entry_date)}</span>
            <span>Log #${UI.escapeHtml(String(e.id).slice(0,4))}</span>
          </div>
          <h2>${UI.escapeHtml(e.title)}</h2>
          ${UI.renderBlocks(e.blocks)}
        </article>
      `).join("");
    })();
  </script>
</body>
</html>
