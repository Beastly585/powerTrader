<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin login · signal.log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<main class="wrap" id="app">
  <div class="center-card">
    <div class="kicker">admin</div>
    <h1>Sign in</h1>
    <p>Magic link sent to the admin email. Anyone else: head back to <a href="index.html">the logs</a>.</p>
    <form id="f" style="margin-top:1.5rem">
      <div class="field"><label>Email</label><input type="email" id="email" required placeholder="you@example.com"></div>
      <div class="toolbar"><button type="submit" class="primary">Send magic link</button></div>
    </form>
    <div id="msg"></div>
  </div>
</main>

<script type="module">
import { supabase, ADMIN_EMAIL } from "./js/supabase.js";
import { mountChrome, banner, isAdmin as _ } from "./js/ui.js";
mountChrome("");

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const msg = document.getElementById("msg");
  if (email !== ADMIN_EMAIL.toLowerCase()) {
    msg.innerHTML = `<div class="notice err">Only the admin can sign in.</div>`;
    return;
  }
  const { error } = await supabase.auth.signInWithOtp({
    email, options: { emailRedirectTo: window.location.origin + "/index.html" }
  });
  if (error) msg.innerHTML = `<div class="notice err">${error.message}</div>`;
  else msg.innerHTML = `<div class="notice ok">Check your inbox for the magic link.</div>`;
});

// If already signed in, bounce home.
const { data:{ user } } = await supabase.auth.getUser();
if (user) location.replace("index.html");
</script>
</body>
</html>
